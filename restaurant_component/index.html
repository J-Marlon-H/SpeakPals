<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:transparent;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden}

.wrap{position:absolute;inset:0;background:rgba(248,250,252,.97);display:none;
  flex-direction:column;align-items:center;justify-content:center;
  padding:10px 118px 10px 10px;gap:10px}
.prompt-text{font:13px/1.5 system-ui;color:#374151;text-align:center;
  max-width:100%;padding:0 4px}

/* ── Avatar panel — right centre ──────────────────────────────────────────── */
.av-panel{
  position:absolute;top:50%;right:10px;transform:translateY(-50%);width:104px;
  background:#fff;backdrop-filter:blur(10px);
  border-radius:14px;padding:5px 5px 5px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  box-shadow:0 4px 20px rgba(17,24,39,.1);border:1px solid rgba(17,24,39,.08)}
.av-title{font:700 8px/1 system-ui;color:rgba(17,24,39,.45);
  letter-spacing:2px;text-transform:uppercase;padding-bottom:1px}
.head-wrap{position:relative;width:70px;height:70px;
  display:flex;align-items:center;justify-content:center}
.blob{position:absolute;width:70px;height:70px;
  border-radius:60% 40% 55% 45%/50% 55% 45% 50%;
  background:linear-gradient(135deg,#e0e9ff,#f5e6ff);
  animation:blobmorph 6s ease-in-out infinite;z-index:0}
@keyframes blobmorph{
  0%,100%{border-radius:60% 40% 55% 45%/50% 55% 45% 50%}
  33%{border-radius:45% 55% 40% 60%/55% 40% 60% 45%}
  66%{border-radius:55% 45% 60% 40%/40% 60% 50% 55%}}
.head-wrap svg{position:relative;z-index:1}
@keyframes breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.head{animation:breathe 3.5s ease-in-out infinite}
@keyframes blink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(0.05)}}
.eyes{animation:blink 5s ease-in-out infinite;transform-origin:center 178px}
@keyframes talk{
  0%,100%{d:path("M 165 292 Q 200 300 235 292 Q 200 316 165 292 Z")}
  40%{d:path("M 167 287 Q 200 274 233 287 Q 200 323 167 287 Z")}}
.mouth.on{animation:talk 0.2s ease-in-out infinite}
.av-lbl{font:9px/1 system-ui;color:rgba(17,24,39,.4);min-height:12px;
  letter-spacing:.3px;text-align:center}
.av-lbl.speaking{color:#0d9488}

/* ── Mic panel — flex item, centred by parent ──────────────────────────────── */
.mic-wrap{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:#fff;backdrop-filter:blur(10px);
  border-radius:32px;padding:6px 14px 7px;
  box-shadow:0 2px 12px rgba(17,24,39,.1);border:1px solid rgba(17,24,39,.08)}
#micBtn{
  width:52px;height:52px;border-radius:50%;border:1px solid rgba(13,148,136,.3);
  cursor:pointer;color:#0d9488;
  position:relative;display:flex;align-items:center;justify-content:center;
  background:rgba(13,148,136,.1);
  box-shadow:0 2px 8px rgba(13,148,136,.12);
  transition:background .25s,box-shadow .25s,color .25s;flex-shrink:0}
#micBtn.listening{
  background:linear-gradient(135deg,#0d9488,#14b8a6);
  box-shadow:0 6px 28px rgba(13,148,136,.6);
  color:#fff;border-color:transparent}
#ring{
  position:absolute;border-radius:50%;width:52px;height:52px;
  border:3px solid rgba(13,148,136,.0);pointer-events:none;
  transition:border-color .1s}
#micBtn.listening #ring{border-color:rgba(13,148,136,.45)}
#micLbl{font:10px/1.3 system-ui;color:rgba(17,24,39,.55);
  letter-spacing:.4px;text-align:center;white-space:nowrap}
</style></head><body>

<div class="wrap" id="wrap">

  <div class="prompt-text" id="promptText"></div>

  <!-- Lars avatar — right centre -->
  <div class="av-panel" id="avPanel">
    <div class="av-title">Lars</div>
    <div class="head-wrap">
      <div class="blob"></div>
      <svg class="head" width="68" height="68" viewBox="0 0 400 400">
        <ellipse cx="200" cy="138" rx="136" ry="132" fill="#c8956c"/>
        <rect x="168" y="346" width="64" height="48" rx="20" fill="#FECBA1"/>
        <ellipse cx="200" cy="415" rx="168" ry="78" fill="#818cf8"/>
        <ellipse cx="200" cy="208" rx="128" ry="146" fill="#FECBA1"/>
        <ellipse cx="128" cy="256" rx="30" ry="18" fill="#ffb3a7" opacity=".38"/>
        <ellipse cx="272" cy="256" rx="30" ry="18" fill="#ffb3a7" opacity=".38"/>
        <ellipse cx="200" cy="88" rx="136" ry="70" fill="#c8956c"/>
        <ellipse cx="88" cy="168" rx="27" ry="70" fill="#c8956c"/>
        <ellipse cx="312" cy="168" rx="27" ry="70" fill="#c8956c"/>
        <ellipse cx="144" cy="80" rx="54" ry="42" fill="#c8956c"/>
        <ellipse cx="256" cy="80" rx="54" ry="42" fill="#c8956c"/>
        <g class="eyes">
          <ellipse cx="152" cy="178" rx="31" ry="27" fill="white"/>
          <circle cx="152" cy="180" r="18" fill="#5b8dd9"/>
          <circle cx="152" cy="180" r="10" fill="#1a1a2e"/>
          <circle cx="158" cy="173" r="5.5" fill="white"/>
          <circle cx="145" cy="184" r="2.5" fill="white" opacity=".6"/>
          <path d="M120 162 Q152 148 184 162" stroke="#a0522d" stroke-width="5" fill="none" stroke-linecap="round"/>
          <ellipse cx="248" cy="178" rx="31" ry="27" fill="white"/>
          <circle cx="248" cy="180" r="18" fill="#5b8dd9"/>
          <circle cx="248" cy="180" r="10" fill="#1a1a2e"/>
          <circle cx="254" cy="173" r="5.5" fill="white"/>
          <circle cx="241" cy="184" r="2.5" fill="white" opacity=".6"/>
          <path d="M216 162 Q248 148 280 162" stroke="#a0522d" stroke-width="5" fill="none" stroke-linecap="round"/>
        </g>
        <ellipse cx="200" cy="234" rx="9" ry="6" fill="#e8a87c" opacity=".45"/>
        <g class="mouth" id="avMouth">
          <path d="M 165 292 Q 200 300 235 292 Q 200 316 165 292 Z" fill="#e05c6a"/>
          <path d="M 165 292 Q 200 286 235 292" fill="#f28b82"/>
          <path d="M 174 293 Q 200 306 226 293" stroke="#c0404e" stroke-width="1.5" fill="none"/>
        </g>
      </svg>
    </div>
    <div class="av-lbl" id="avLbl"></div>
  </div>

  <!-- Mic button — bottom centre -->
  <div class="mic-wrap" id="micWrap">
    <button id="micBtn" onclick="toggleMic()">
      <div id="ring"></div>
      <svg width="24" height="24" viewBox="0 0 24 24"
           fill="currentColor" style="pointer-events:none;transition:fill .25s">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"
              stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
        <line x1="12" y1="19" x2="12" y2="23"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="8"  y1="23" x2="16" y2="23"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="micLbl">tap to speak</div>
  </div>

</div>
<script>
// ── Streamlit protocol ──────────────────────────────────────────────────────
function send(val){
  window.parent.postMessage({isStreamlitMessage:true,type:"streamlit:setComponentValue",value:val},"*");
}
window.parent.postMessage({isStreamlitMessage:true,type:"streamlit:componentReady",apiVersion:1},"*");

// Strip native controls from every video Streamlit renders, regardless of phase
setInterval(function() {
  try {
    var vids = window.parent.document.querySelectorAll('video');
    for (var i = 0; i < vids.length; i++) { vids[i].removeAttribute('controls'); }
  } catch(e) {}
}, 300);

// ── DOM refs ────────────────────────────────────────────────────────────────
var wrap      = document.getElementById("wrap");
var promptEl  = document.getElementById("promptText");
var avMouth   = document.getElementById("avMouth");
var avLbl   = document.getElementById("avLbl");
var micWrap = document.getElementById("micWrap");
var micBtn  = document.getElementById("micBtn");
var micLbl  = document.getElementById("micLbl");

// ── Phase state ─────────────────────────────────────────────────────────────
var isMicPhase      = false;
var isFeedbackPhase = false;
var proxyPort = null, wsToken = null;
var sceneIdx  = 0;
var langCode  = "da";

function updateUI() {
  var show = isMicPhase || isFeedbackPhase;
  wrap.style.display    = show ? "flex" : "none";
  micWrap.style.display = isMicPhase ? "flex" : "none";
  avMouth.classList.toggle("on", isFeedbackPhase);
  avLbl.textContent = isFeedbackPhase ? "speaking…" : (isMicPhase ? "listening" : "");
  avLbl.className   = "av-lbl" + (isFeedbackPhase ? " speaking" : "");
}

// ── Props from Python ───────────────────────────────────────────────────────
window.addEventListener("message", function(e) {
  if (!e.data || e.data.type !== "streamlit:render" || !e.data.args) return;
  var a = e.data.args;
  if (a.proxy_port != null) proxyPort = a.proxy_port;
  if (a.ws_token   != null) wsToken   = a.ws_token;
  if (a.scene_idx  != null) sceneIdx  = a.scene_idx;
  if (a.lang_code  != null) langCode  = a.lang_code;
  if (a.label      != null) micLbl.textContent = a.label;
  if (a.prompt     != null) promptEl.textContent = a.prompt;
  if (a.visible != null) {
    isMicPhase = a.visible;
    if (a.visible) { prewarmMic(); }
    updateUI();
  }
  if (a.watch_video != null) { if (a.watch_video) startWatchingVideo(); else stopWatchingVideo(); }
  if (a.watch_audio != null) {
    isFeedbackPhase = a.watch_audio;
    if (a.watch_audio) startWatchingAudio(); else stopWatchingAudio();
    updateUI();
  }
});

// ── Video auto-advance ──────────────────────────────────────────────────────
var videoMonitor = null;
var videoWatchInterval = null;

function startWatchingVideo() {
  stopWatchingVideo();
  try {
    var vids = window.parent.document.querySelectorAll('video');
    for (var i = 0; i < vids.length; i++) { vids[i]._sp_watched = false; }
  } catch(e) {}
  tryAttachVideo();
  try {
    videoMonitor = new MutationObserver(function() { tryAttachVideo(); });
    videoMonitor.observe(window.parent.document.body, {childList:true, subtree:true});
  } catch(e) {}
  videoWatchInterval = setInterval(function() {
    try {
      var vids = window.parent.document.querySelectorAll('video');
      for (var i = 0; i < vids.length; i++) {
        var v = vids[i];
        if (v.ended && !v._sp_advanced) {
          v._sp_advanced = true;
          v.style.visibility = 'hidden';
          stopWatchingVideo();
          send({type:"video_ended", scene_idx:sceneIdx});
          return;
        }
        if (v._sp_watched && v.paused && !v.ended) { v.play().catch(function(){}); }
      }
    } catch(e) {}
  }, 400);
}

function tryAttachVideo() {
  try {
    var vids = window.parent.document.querySelectorAll('video');
    for (var i = 0; i < vids.length; i++) {
      var v = vids[i];
      v.removeAttribute('controls');
      if (v._sp_watched) continue;
      if (v.ended) { v._sp_watched = true; continue; }
      v._sp_watched = true;
      if (v.paused) { v.play().catch(function(){}); }
      v.addEventListener('ended', function() {
        this.style.visibility = 'hidden';
        stopWatchingVideo();
        send({type:"video_ended", scene_idx:sceneIdx});
      }, {once:true});
      break;
    }
  } catch(e) {}
}

function stopWatchingVideo() {
  if (videoMonitor) { videoMonitor.disconnect(); videoMonitor = null; }
  if (videoWatchInterval) { clearInterval(videoWatchInterval); videoWatchInterval = null; }
}

// ── Audio auto-advance (feedback TTS) ──────────────────────────────────────
var audioMonitor = null;

function startWatchingAudio() {
  stopWatchingAudio();
  try {
    var auds = window.parent.document.querySelectorAll('audio');
    for (var i = 0; i < auds.length; i++) { auds[i]._sp_watched = false; }
  } catch(e) {}
  tryAttachAudio();
  try {
    audioMonitor = new MutationObserver(function() { tryAttachAudio(); });
    audioMonitor.observe(window.parent.document.body, {childList:true, subtree:true});
  } catch(e) {}
}

function tryAttachAudio() {
  try {
    var a = window.parent.document.querySelector('audio');
    if (a && !a._sp_watched) {
      a._sp_watched = true;
      if (a.ended) { stopWatchingAudio(); send({type:"audio_ended"}); return; }
      a.addEventListener('ended', function() {
        stopWatchingAudio();
        send({type:"audio_ended"});
      }, {once:true});
    }
  } catch(e) {}
}

function stopWatchingAudio() {
  if (audioMonitor) { audioMonitor.disconnect(); audioMonitor = null; }
}

// ── PCM AudioWorklet ────────────────────────────────────────────────────────
var WORKLET = `
class PCMProcessor extends AudioWorkletProcessor {
  constructor(){super();this._buf=[];this._samples=0;this._target=1600;}
  process(inputs){
    var ch=inputs[0][0];if(!ch||!ch.length)return true;
    var pcm=new Int16Array(ch.length);
    for(var i=0;i<ch.length;i++){var s=Math.max(-1,Math.min(1,ch[i]));pcm[i]=s<0?s*32768:s*32767;}
    this._buf.push(pcm);this._samples+=pcm.length;
    if(this._samples>=this._target){
      var tot=new Int16Array(this._samples),off=0;
      for(var j=0;j<this._buf.length;j++){tot.set(this._buf[j],off);off+=this._buf[j].length;}
      this.port.postMessage(tot.buffer,[tot.buffer]);
      this._buf=[];this._samples=0;
    }
    return true;
  }
}
registerProcessor("pcm-processor",PCMProcessor);
`;

// ── Mic state ────────────────────────────────────────────────────────────────
var micStream   = null;
var workletNode = null, audioCtx = null, analyser = null, ws = null;
var listening   = false, committed = false, fired = false, lastPartial = "";
var spokenOnce  = false, lastSound = 0, startTime = 0, vadTimer = null;

var SILENCE_MS = 1800;
var PROTECT_MS = 800;
var THRESH     = 5;

async function prewarmMic() {
  var live = micStream && micStream.getTracks().some(function(t){ return t.readyState==='live'; });
  if (!live) {
    try { micStream = await navigator.mediaDevices.getUserMedia({audio:true,video:false}); }
    catch(e) {}
  }
}

function toggleMic() {
  if (listening) { commitAndStop(); } else { startListening(); }
}

async function startListening() {
  var live = micStream && micStream.getTracks().some(function(t){ return t.readyState==='live'; });
  if (!live) {
    try { micStream = await navigator.mediaDevices.getUserMedia({audio:true,video:false}); }
    catch(e) { micLbl.textContent = "Mic blocked"; return; }
  }
  if (!proxyPort && !wsToken) { micLbl.textContent = "Not ready"; return; }

  committed = false; fired = false; lastPartial = "";
  spokenOnce = false; lastSound = 0; startTime = Date.now();

  var wsUrl = proxyPort
    ? "ws://localhost:" + proxyPort + "?lang=" + langCode
    : "wss://api.elevenlabs.io/v1/speech-to-text/realtime"
      + "?token=" + wsToken
      + "&audio_format=pcm_16000"
      + "&model_id=scribe_v2_realtime"
      + "&language_code=" + langCode;

  ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = function() {
    if (proxyPort) ws.send(JSON.stringify({type:"init",lang:langCode}));
    _setupAudio();
  };
  ws.onmessage = function(e) {
    try {
      var msg = JSON.parse(e.data);
      var mt  = msg.message_type || msg.type || "";
      if (mt === "partial_transcript" && msg.text) {
        lastPartial = msg.text;
        micLbl.textContent = msg.text.length > 42 ? "…"+msg.text.slice(-40) : msg.text;
      }
      if ((mt === "committed_transcript" || mt === "committed_transcript_with_timestamps") && msg.text) {
        if (!fired) { fired = true; sendTranscript(msg.text); }
        resetMic();
      }
      if (mt === "error" || mt === "auth_error" || mt === "input_error") { resetMic(); }
    } catch(_){}
  };
  ws.onerror = function() { resetMic(); };
  ws.onclose = function() { if (listening) commitAndStop(); else resetMic(); };
}

async function _setupAudio() {
  try {
    audioCtx = new AudioContext({sampleRate:16000});
    var blobUrl = URL.createObjectURL(new Blob([WORKLET],{type:"application/javascript"}));
    await audioCtx.audioWorklet.addModule(blobUrl);
    if (audioCtx.state === 'suspended') { try { await audioCtx.resume(); } catch(_){} }

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    var src = audioCtx.createMediaStreamSource(micStream);
    src.connect(analyser);
    workletNode = new AudioWorkletNode(audioCtx,"pcm-processor");
    src.connect(workletNode);

    workletNode.port.onmessage = function(ev) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      if (proxyPort) {
        ws.send(ev.data);
      } else {
        var bytes = new Uint8Array(ev.data);
        var bin = '';
        for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
        ws.send(JSON.stringify({
          message_type:'input_audio_chunk', audio_base_64:btoa(bin),
          commit:false, sample_rate:16000
        }));
      }
    };

    listening = true;
    micBtn.classList.add("listening");
    micLbl.textContent = "Listening…";
    startVAD();
  } catch(e) { resetMic(); }
}

function startVAD() {
  vadTimer = setInterval(function() {
    if (!listening || !analyser) { clearInterval(vadTimer); return; }
    if (audioCtx && audioCtx.state === 'suspended') { audioCtx.resume(); }
    var data = new Uint8Array(analyser.fftSize);
    analyser.getByteTimeDomainData(data);
    var sum = 0;
    for (var i = 0; i < data.length; i++) { var d = data[i]-128; sum += d*d; }
    var rms = Math.sqrt(sum / data.length);
    if (rms > THRESH) { lastSound = Date.now(); spokenOnce = true; }
    var elapsed = Date.now() - startTime;
    var silent  = lastSound === 0 ? 0 : Date.now() - lastSound;
    if (spokenOnce && silent > SILENCE_MS && elapsed > PROTECT_MS) {
      clearInterval(vadTimer);
      commitAndStop();
    }
  }, 50);
}

function commitAndStop() {
  if (committed) return;
  committed = true;
  if (vadTimer) { clearInterval(vadTimer); vadTimer = null; }
  listening = false;
  micBtn.classList.remove("listening");

  if (workletNode) { workletNode.port.onmessage=null; workletNode.disconnect(); workletNode=null; }
  if (ws && ws.readyState === WebSocket.OPEN) {
    if (proxyPort) {
      ws.send(JSON.stringify({type:"commit"}));
    } else {
      ws.send(JSON.stringify({
        message_type:'input_audio_chunk', audio_base_64:'', commit:true, sample_rate:16000
      }));
    }
  }
  if (audioCtx) { audioCtx.close(); audioCtx=null; analyser=null; }
  if (micStream) { micStream.getTracks().forEach(function(t){ t.stop(); }); micStream=null; }

  if (lastPartial && !fired) {
    fired = true; sendTranscript(lastPartial); lastPartial = '';
  } else if (!fired) {
    micLbl.textContent = "Transcribing…";
  }
}

function resetMic() {
  listening = false; committed = false; fired = false; lastPartial = '';
  if (vadTimer) { clearInterval(vadTimer); vadTimer = null; }
  micBtn.classList.remove("listening");
  var _ws = ws; ws = null;
  if (_ws) { try { _ws.close(); } catch(_){} }
  if (workletNode) { workletNode.port.onmessage=null; workletNode.disconnect(); workletNode=null; }
  if (audioCtx) { audioCtx.close(); audioCtx=null; analyser=null; }
  if (micStream) { micStream.getTracks().forEach(function(t){ t.stop(); }); micStream=null; }
  setTimeout(function(){ if (!listening) micLbl.textContent = "tap to speak"; }, 1500);
  setTimeout(prewarmMic, 300);
}

function sendTranscript(text) {
  micLbl.textContent = "✓ " + text.slice(0, 38);
  send({type:"transcript", scene_idx:sceneIdx, text:text});
}
</script></body></html>
