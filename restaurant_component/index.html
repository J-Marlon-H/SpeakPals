<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:transparent;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden}
.root{width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:10px 16px;gap:8px}
.root.hidden{display:none}

.mic-btn{
  width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,.12);color:#e2e8f0;font-size:24px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,box-shadow .2s}
.mic-btn.listening{
  background:linear-gradient(135deg,#0d9488,#14b8a6);
  box-shadow:0 4px 22px rgba(13,148,136,.65);
  animation:pulse 1.1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

.mic-lbl{font:11px system-ui;color:rgba(255,255,255,.6);
  letter-spacing:.4px;text-align:center;min-height:16px}
.hint-btn{
  background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);
  color:#fcd34d;font:11px system-ui;padding:4px 12px;border-radius:8px;
  cursor:pointer;display:none}
.hint-btn.on{display:block}
.hint-text{
  font:12px/1.5 system-ui;color:#fcd34d;
  background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);
  border-radius:8px;padding:8px 12px;text-align:center;
  display:none;max-width:340px}
.hint-text.on{display:block}
</style></head><body>
<div class="root hidden">
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <div class="mic-lbl" id="micLbl">Tap to speak</div>
  <button class="hint-btn" id="hintBtn" onclick="toggleHint()">Hint 💡</button>
  <div class="hint-text" id="hintText"></div>
</div>
<script>
// ── Streamlit protocol ──────────────────────────────────────────────────────
function send(val){
  window.parent.postMessage({isStreamlitMessage:true,type:"streamlit:setComponentValue",value:val},"*");
}
window.parent.postMessage({isStreamlitMessage:true,type:"streamlit:componentReady",apiVersion:1},"*");

// ── DOM refs ────────────────────────────────────────────────────────────────
var micBtn  = document.getElementById("micBtn");
var micLbl  = document.getElementById("micLbl");
var hintBtn = document.getElementById("hintBtn");
var hintText= document.getElementById("hintText");

// ── State ───────────────────────────────────────────────────────────────────
var proxyPort = null, wsToken = null;
var sceneIdx  = 0;
var langCode  = "da";

// ── Props from Python ───────────────────────────────────────────────────────
var root = document.querySelector(".root");
window.addEventListener("message", function(e) {
  if (!e.data || e.data.type !== "streamlit:render" || !e.data.args) return;
  var a = e.data.args;
  if (a.proxy_port != null) proxyPort = a.proxy_port;
  if (a.ws_token   != null) wsToken   = a.ws_token;
  if (a.scene_idx  != null) sceneIdx  = a.scene_idx;
  if (a.lang_code  != null) langCode  = a.lang_code;
  if (a.label      != null) micLbl.textContent = a.label;
  if (a.hint != null) {
    hintText.textContent = a.hint ? "💡 " + a.hint : "";
    hintBtn.classList.toggle("on", !!a.hint);
  }
  // Show/hide mic UI without unmounting the iframe
  if (a.visible != null) root.classList.toggle("hidden", !a.visible);
  if (a.watch_video != null) { if (a.watch_video) startWatchingVideo(); else stopWatchingVideo(); }
});

function toggleHint() { hintText.classList.toggle("on"); }

// ── Video auto-advance ──────────────────────────────────────────────────────
var videoMonitor = null;

function startWatchingVideo() {
  stopWatchingVideo();
  try {
    var vids = window.parent.document.querySelectorAll('video');
    for (var i = 0; i < vids.length; i++) { vids[i]._sp_watched = false; }
  } catch(e) {}
  tryAttachVideo();
  try {
    videoMonitor = new MutationObserver(function() { tryAttachVideo(); });
    videoMonitor.observe(window.parent.document.body, {childList:true, subtree:true});
  } catch(e) {}
}

function tryAttachVideo() {
  try {
    var v = window.parent.document.querySelector('video');
    if (v && !v._sp_watched) {
      v._sp_watched = true;
      v.addEventListener('ended', function() {
        stopWatchingVideo();
        send({type:"video_ended"});
      }, {once:true});
    }
  } catch(e) {}
}

function stopWatchingVideo() {
  if (videoMonitor) { videoMonitor.disconnect(); videoMonitor = null; }
}

// ── PCM AudioWorklet ────────────────────────────────────────────────────────
var WORKLET = `
class PCMProcessor extends AudioWorkletProcessor {
  constructor(){super();this._buf=[];this._samples=0;this._target=1600;}
  process(inputs){
    var ch=inputs[0][0];if(!ch||!ch.length)return true;
    var pcm=new Int16Array(ch.length);
    for(var i=0;i<ch.length;i++){var s=Math.max(-1,Math.min(1,ch[i]));pcm[i]=s<0?s*32768:s*32767;}
    this._buf.push(pcm);this._samples+=pcm.length;
    if(this._samples>=this._target){
      var tot=new Int16Array(this._samples),off=0;
      for(var j=0;j<this._buf.length;j++){tot.set(this._buf[j],off);off+=this._buf[j].length;}
      this.port.postMessage(tot.buffer,[tot.buffer]);
      this._buf=[];this._samples=0;
    }
    return true;
  }
}
registerProcessor("pcm-processor",PCMProcessor);
`;

// ── Mic recording ───────────────────────────────────────────────────────────
var micStream   = null;
var workletNode = null, audioCtx = null, ws = null;
var listening   = false, committed = false, lastPartial = "";

function prewarmMic() {
  if (!micStream)
    navigator.mediaDevices.getUserMedia({audio:true,video:false})
      .then(function(s){ micStream = s; }).catch(function(){});
}
prewarmMic();

function toggleMic() {
  if (listening) { commitAndStop(); } else { startListening(); }
}

async function startListening() {
  if (!micStream) {
    try { micStream = await navigator.mediaDevices.getUserMedia({audio:true,video:false}); }
    catch(e) { micLbl.textContent = "Mic blocked"; return; }
  }
  if (!proxyPort && !wsToken) { micLbl.textContent = "Not ready"; return; }

  committed = false; lastPartial = "";
  var wsUrl = proxyPort
    ? "ws://localhost:" + proxyPort + "?lang=" + langCode
    : "wss://api.elevenlabs.io/v1/speech-to-text/realtime?token=" + wsToken + "&model_id=scribe_v2_realtime";

  ws = new WebSocket(wsUrl);
  ws.onopen  = function(){ if (proxyPort) ws.send(JSON.stringify({type:"init",lang:langCode})); };
  ws.onmessage = function(e) {
    try {
      var msg = JSON.parse(e.data);
      var mt  = msg.message_type || msg.type || "";
      if (mt === "partial_transcript" && msg.text) {
        lastPartial = msg.text;
        micLbl.textContent = msg.text.length > 42 ? "…"+msg.text.slice(-40) : msg.text;
      }
      if ((mt === "committed_transcript" || mt === "committed_transcript_with_timestamps") && msg.text) {
        if (!committed) { committed = true; sendTranscript(msg.text); }
        stopAudio();
      }
      if (mt === "error" || mt === "auth_error") { stopAudio(); }
    } catch(_){}
  };
  ws.onerror = function(){ stopAudio(); };
  ws.onclose = function(){ if (listening) commitAndStop(); };

  audioCtx = new AudioContext({sampleRate:16000});
  var blobUrl = URL.createObjectURL(new Blob([WORKLET],{type:"application/javascript"}));
  await audioCtx.audioWorklet.addModule(blobUrl);
  var src = audioCtx.createMediaStreamSource(micStream);
  workletNode = new AudioWorkletNode(audioCtx,"pcm-processor");
  src.connect(workletNode);
  workletNode.port.onmessage = function(ev) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(ev.data);
  };

  listening = true;
  micBtn.classList.add("listening");
  micLbl.textContent = "Listening…";
}

function commitAndStop() {
  if (!listening) return;
  listening = false;
  micBtn.classList.remove("listening");
  if (workletNode){ workletNode.port.onmessage=null; workletNode.disconnect(); workletNode=null; }
  if (ws && ws.readyState === WebSocket.OPEN) {
    if (proxyPort) ws.send(JSON.stringify({type:"commit"}));
    else ws.send(JSON.stringify({message_type:"input_audio_chunk",audio_base_64:"",commit:true,sample_rate:16000}));
  }
  if (audioCtx){ audioCtx.close(); audioCtx=null; }
  ws = null;
  if (lastPartial && !committed) {
    committed = true; sendTranscript(lastPartial);
  } else if (!committed) {
    micLbl.textContent = "Transcribing…";
  }
}

function stopAudio() {
  listening = false;
  micBtn.classList.remove("listening");
  if (workletNode){ workletNode.port.onmessage=null; workletNode.disconnect(); workletNode=null; }
  if (audioCtx){ audioCtx.close(); audioCtx=null; }
  ws = null;
}

function sendTranscript(text) {
  micLbl.textContent = "✓ " + text.slice(0, 40);
  send({type:"transcript", scene_idx:sceneIdx, text:text});
}
</script></body></html>
