      <stop offset="0%" stop-color="#e0e9ff"/>
      <stop offset="100%" stop-color="#f5e6ff"/>
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="45%" stop-color="#f7f8fa" stop-opacity="0"/>
      <stop offset="100%" stop-color="#042f2e" stop-opacity="0.96"/>
