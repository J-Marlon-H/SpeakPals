<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: transparent;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 160px; font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}
#btn {
  width: 104px; height: 104px; border-radius: 50%; border: none;
  cursor: pointer; position: relative;
  display: flex; align-items: center; justify-content: center;
  background: #e2e8f0;
  box-shadow: 0 4px 20px rgba(0,0,0,.12);
  transition: background .25s, box-shadow .25s;
}
#btn.listening {
  background: linear-gradient(135deg, #818cf8, #a78bfa);
  box-shadow: 0 6px 32px rgba(129,140,248,.55);
}
#ring {
  position: absolute; border-radius: 50%;
  width: 104px; height: 104px;
  border: 3px solid rgba(129,140,248,.0);
  pointer-events: none;
  transition: transform .1s, border-color .1s;
}
#btn.listening #ring { border-color: rgba(129,140,248,.4); }
#lbl { margin-top: 12px; font-size: 12px; color: #94a3b8; letter-spacing: .4px; text-align: center; }
</style></head><body>
<button id="btn" onclick="toggle()">
  <div id="ring"></div>
  <svg id="mic" width="40" height="40" viewBox="0 0 24 24" fill="#94a3b8" style="pointer-events:none;transition:fill .25s">
    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
    <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round" id="arc"/>
    <line x1="12" y1="19" x2="12" y2="23" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" id="line1"/>
    <line x1="8"  y1="23" x2="16" y2="23" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" id="line2"/>
  </svg>
</button>
<div id="lbl">tap to speak</div>
<script>
// Streamlit plumbing
function sendToStreamlit(val) {
  window.parent.postMessage({isStreamlitMessage:true, type:"streamlit:setComponentValue", value:val}, "*");
}
window.parent.postMessage({isStreamlitMessage:true, type:"streamlit:componentReady", apiVersion:1}, "*");

// Receive props from Python
// Local mode:  proxy_port set  → ws://localhost:{proxy_port}?lang={lang}
// Cloud mode:  eleven_key set  → wss://api.elevenlabs.io/...?xi-api-key={eleven_key}
var lang         = "da";
var proxyPort    = null;
var elevenKey    = null;
var rendered     = false;
var pendingStart = false;
window.addEventListener("message", function(e) {
  if (e.data && e.data.type === "streamlit:render" && e.data.args) {
    lang      = e.data.args.lang        || "da";
    proxyPort = e.data.args.proxy_port  || null;
    elevenKey = e.data.args.eleven_key  || null;
    rendered  = true;
    if (pendingStart) { pendingStart = false; startListening(); }
  }
});

// DOM refs
var btn  = document.getElementById('btn');
var ring = document.getElementById('ring');
var lbl  = document.getElementById('lbl');

function setColor(c) {
  ['mic','arc','line1','line2'].forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    if (id === 'mic') el.setAttribute('fill', c);
    else              el.setAttribute('stroke', c);
  });
}

// State
var stream=null, workletNode=null, audioCtx=null, analyser=null, ws=null;
var listening=false, spokenOnce=false, committed=false, fired=false;
var lastSound=0, startTime=0, vadTimer=null;
var lastPartial='';

var SILENCE_MS = 1200;
var PROTECT_MS = 1000;
var THRESH     = 10;

var WORKLET_CODE = `
class PCMProcessor extends AudioWorkletProcessor {
  constructor() { super(); this._buf = []; this._samples = 0; this._target = 1600; }
  process(inputs) {
    var ch = inputs[0][0];
    if (!ch || ch.length === 0) return true;
    var pcm = new Int16Array(ch.length);
    for (var i = 0; i < ch.length; i++) {
      var s = Math.max(-1, Math.min(1, ch[i]));
      pcm[i] = s < 0 ? s * 32768 : s * 32767;
    }
    this._buf.push(pcm);
    this._samples += pcm.length;
    if (this._samples >= this._target) {
      var total = new Int16Array(this._samples);
      var offset = 0;
      for (var j = 0; j < this._buf.length; j++) {
        total.set(this._buf[j], offset);
        offset += this._buf[j].length;
      }
      this.port.postMessage(total.buffer, [total.buffer]);
      this._buf = []; this._samples = 0;
    }
    return true;
  }
}
registerProcessor('pcm-processor', PCMProcessor);
`;

async function toggle() {
  if (listening) { commitAndStop(); return; }
  if (!rendered) { pendingStart = true; lbl.textContent = 'loading...'; return; }
  await startListening();
}

async function startListening() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
  } catch(e) { lbl.textContent = 'mic blocked'; return; }

  var wsUrl;
  if (proxyPort) {
    wsUrl = 'ws://localhost:' + proxyPort + '?lang=' + lang;
  } else {
    // Cloud mode: connect directly to ElevenLabs with key in query string
    wsUrl = 'wss://api.elevenlabs.io/v1/speech-to-text/realtime'
      + '?model_id=scribe_v2_realtime'
      + '&language_code=' + lang
      + '&encoding=pcm_s16le'
      + '&sample_rate=16000'
      + '&xi-api-key=' + elevenKey;
  }
  ws = new WebSocket(wsUrl);
  ws.binaryType = 'arraybuffer';

  ws.onopen = async function() {
    audioCtx = new AudioContext({ sampleRate: 16000 });
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    var src = audioCtx.createMediaStreamSource(stream);
    src.connect(analyser);

    var blob = new Blob([WORKLET_CODE], { type: 'application/javascript' });
    var blobUrl = URL.createObjectURL(blob);
    await audioCtx.audioWorklet.addModule(blobUrl);
    URL.revokeObjectURL(blobUrl);

    workletNode = new AudioWorkletNode(audioCtx, 'pcm-processor');
    src.connect(workletNode);

    workletNode.port.onmessage = function(e) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      if (proxyPort) {
        // Local mode: proxy handles base64 conversion
        ws.send(e.data);
      } else {
        // Cloud mode: ElevenLabs expects base64-encoded JSON, not raw binary
        var bytes = new Uint8Array(e.data);
        var bin = '';
        for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
        ws.send(JSON.stringify({
          message_type: 'input_audio_chunk',
          audio_base_64: btoa(bin),
          commit: false,
          sample_rate: 16000
        }));
      }
    };

    spokenOnce  = false;
    committed   = false;
    fired       = false;
    lastPartial = '';
    startTime   = Date.now();
    lastSound   = 0;
    listening  = true;
    btn.classList.add('listening');
    setColor('white');
    lbl.textContent = 'listening...';
    startVAD();
  };

  ws.onmessage = function(e) {
    try {
      var msg = JSON.parse(e.data);
      var mt = msg.message_type || msg.type || '';
      if (mt === 'partial_transcript' && msg.text) {
        lastPartial = msg.text;
        lbl.textContent = msg.text.length > 40 ? msg.text.slice(-40) + '...' : msg.text;
      }
      if ((mt === 'committed_transcript' || mt === 'committed_transcript_with_timestamps') && msg.text) {
        lbl.textContent = msg.text.length > 40 ? msg.text.slice(-40) + '...' : msg.text;
        if (!fired) { fired = true; sendToStreamlit(msg.text); resetUI(); }  // fallback if no partial fired yet
      }
      if (mt === 'error' || mt === 'auth_error' || mt === 'input_error') {
        lbl.textContent = 'STT error';
        resetUI();
      }
    } catch(_) {}
  };

  ws.onerror = function() { lbl.textContent = 'proxy error'; resetUI(); };
  ws.onclose = function() { if (listening) resetUI(); };
}

function startVAD() {
  vadTimer = setInterval(function() {
    if (!listening || !analyser) { clearInterval(vadTimer); return; }
    var data = new Uint8Array(analyser.fftSize);
    analyser.getByteTimeDomainData(data);
    var sum = 0;
    for (var i = 0; i < data.length; i++) { var d = data[i]-128; sum += d*d; }
    var rms = Math.sqrt(sum / data.length);
    ring.style.transform = 'scale(' + (1 + Math.min(rms/28, 0.65)) + ')';
    if (rms > THRESH) { lastSound = Date.now(); spokenOnce = true; }
    var elapsed = Date.now() - startTime;
    var silent  = lastSound === 0 ? 0 : Date.now() - lastSound;
    if (spokenOnce && silent > SILENCE_MS && elapsed > PROTECT_MS) {
      clearInterval(vadTimer);
      commitAndStop();
    }
  }, 50);
}

function commitAndStop() {
  if (committed) return;
  committed = true;
  clearInterval(vadTimer);
  listening = false;
  btn.classList.remove('listening');
  ring.style.transform = 'scale(1)';
  setColor('#94a3b8');

  if (workletNode) { workletNode.port.onmessage = null; workletNode.disconnect(); workletNode = null; }
  if (ws && ws.readyState === WebSocket.OPEN) {
    if (proxyPort) {
      // Local mode: proxy translates this to the ElevenLabs commit format
      ws.send(JSON.stringify({type: 'commit'}));
    } else {
      // Cloud mode: send commit directly in ElevenLabs format
      ws.send(JSON.stringify({
        message_type: 'input_audio_chunk',
        audio_base_64: '',
        commit: true,
        sample_rate: 16000
      }));
    }
  }
  if (audioCtx) { audioCtx.close(); audioCtx = null; analyser = null; }
  if (stream)   { stream.getTracks().forEach(function(t) { t.stop(); }); stream = null; }

  // Fire pipeline immediately on the last partial — don't wait for ElevenLabs commit round-trip
  if (lastPartial) {
    fired = true;
    sendToStreamlit(lastPartial);
    lbl.textContent = lastPartial.length > 40 ? lastPartial.slice(-40) + '...' : lastPartial;
    lastPartial = '';
  } else {
    lbl.textContent = 'transcribing...';  // waiting for committed_transcript fallback
  }
}

function resetUI() {
  listening = false;
  committed = false;
  fired     = false;
  lastPartial = '';
  if (vadTimer) { clearInterval(vadTimer); vadTimer = null; }
  btn.classList.remove('listening');
  ring.style.transform = 'scale(1)';
  setColor('#94a3b8');
  if (ws) { ws.close(); ws = null; }
  setTimeout(function() { lbl.textContent = 'tap to speak'; }, 1500);
}
</script>
</body></html>
