<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif}
html,body{background:transparent;overflow:hidden;width:100%;height:100%}
.wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 8px;gap:7px;min-height:90px}
#btn{
  width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,.13);color:#e2e8f0;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,box-shadow .2s,transform .1s;
  box-shadow:0 2px 10px rgba(0,0,0,.35)}
#btn:hover{background:rgba(255,255,255,.2)}
#btn.listening{
  background:linear-gradient(135deg,#0d9488,#14b8a6);
  box-shadow:0 4px 22px rgba(13,148,136,.65);
  animation:pulse 1.1s ease-in-out infinite}
#btn.done{background:rgba(13,148,136,.35);box-shadow:0 2px 10px rgba(13,148,136,.3)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
#lbl{font-size:11px;color:rgba(255,255,255,.55);text-align:center;
  min-height:14px;letter-spacing:.3px;max-width:120px;word-break:break-word;line-height:1.4}
#lbl.active{color:#2dd4bf}
#lbl.done{color:#6ee7b7}
</style></head><body><div class="wrap">
  <button id="btn" onclick="toggle()" title="Tap to speak in Danish">🎤</button>
  <div id="lbl">Tap to speak</div>
</div>
<script>
var btn = document.getElementById('btn');
var lbl = document.getElementById('lbl');

// ── Streamlit protocol ──────────────────────────────────────────────────────
function sendToStreamlit(val) {
  window.parent.postMessage({isStreamlitMessage:true, type:"streamlit:setComponentValue", value:val}, "*");
}
window.parent.postMessage({isStreamlitMessage:true, type:"streamlit:componentReady", apiVersion:1}, "*");

var proxyPort  = null;
var wsToken    = null;
var lang       = "da";
var rendered   = false;

window.addEventListener("message", function(e) {
  if (!e.data || e.data.type !== "streamlit:render" || !e.data.args) return;
  var a = e.data.args;
  if (a.proxy_port != null) proxyPort = a.proxy_port;
  if (a.ws_token   != null) wsToken   = a.ws_token;
  if (a.lang       != null) lang      = a.lang;
  rendered = true;
});

// ── PCM AudioWorklet ────────────────────────────────────────────────────────
var WORKLET = `
class PCMProcessor extends AudioWorkletProcessor {
  constructor(){super();this._buf=[];this._samples=0;this._target=1600;}
  process(inputs){
    var ch=inputs[0][0];if(!ch||!ch.length)return true;
    var pcm=new Int16Array(ch.length);
    for(var i=0;i<ch.length;i++){var s=Math.max(-1,Math.min(1,ch[i]));pcm[i]=s<0?s*32768:s*32767;}
    this._buf.push(pcm);this._samples+=pcm.length;
    if(this._samples>=this._target){
      var tot=new Int16Array(this._samples),off=0;
      for(var j=0;j<this._buf.length;j++){tot.set(this._buf[j],off);off+=this._buf[j].length;}
      this.port.postMessage(tot.buffer,[tot.buffer]);
      this._buf=[];this._samples=0;
    }
    return true;
  }
}
registerProcessor('pcm-processor',PCMProcessor);
`;

// ── State ───────────────────────────────────────────────────────────────────
var stream=null, workletNode=null, audioCtx=null, ws=null;
var listening=false, committed=false, lastPartial='';

function toggle() {
  if (listening) { commitAndStop(); return; }
  startListening();
}

async function startListening() {
  if (!rendered) { lbl.textContent='loading…'; return; }
  if (!proxyPort && !wsToken) { lbl.textContent='not ready'; return; }

  try {
    stream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
  } catch(e) { lbl.textContent='mic blocked'; return; }

  var wsUrl = proxyPort
    ? 'ws://localhost:' + proxyPort + '?lang=' + lang
    : 'wss://api.elevenlabs.io/v1/speech-to-text/realtime?token=' + wsToken + '&model_id=scribe_v2_realtime';

  committed = false; lastPartial = '';
  ws = new WebSocket(wsUrl);

  ws.onopen = function() {
    if (proxyPort) ws.send(JSON.stringify({type:'init', lang:lang}));
  };
  ws.onmessage = function(e) {
    try {
      var msg = JSON.parse(e.data);
      var mt  = msg.message_type || msg.type || '';
      if (mt === 'partial_transcript' && msg.text) {
        lastPartial = msg.text;
        lbl.textContent = shorten(msg.text);
        lbl.className = 'active';
      }
      if ((mt === 'committed_transcript' || mt === 'committed_transcript_with_timestamps') && msg.text) {
        if (!committed) { committed = true; sendToStreamlit(msg.text); }
        lbl.textContent = '✓ ' + shorten(msg.text);
        lbl.className = 'done';
        cleanup();
      }
      if (mt === 'error' || mt === 'auth_error' || mt === 'input_error') {
        lbl.textContent = 'STT error'; lbl.className = '';
        cleanup();
      }
    } catch(_) {}
  };
  ws.onerror = function() { lbl.textContent = 'connection error'; lbl.className = ''; cleanup(); };
  ws.onclose = function() { if (listening) commitAndStop(); };

  audioCtx = new AudioContext({sampleRate:16000});
  var blobUrl = URL.createObjectURL(new Blob([WORKLET], {type:'application/javascript'}));
  await audioCtx.audioWorklet.addModule(blobUrl);
  var src = audioCtx.createMediaStreamSource(stream);
  workletNode = new AudioWorkletNode(audioCtx, 'pcm-processor');
  src.connect(workletNode);
  workletNode.port.onmessage = function(e) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(e.data);
  };

  listening = true;
  btn.classList.add('listening');
  lbl.textContent = 'Listening…';
  lbl.className = 'active';
}

function commitAndStop() {
  if (!listening) return;
  listening = false;
  btn.classList.remove('listening');

  if (workletNode) { workletNode.port.onmessage=null; workletNode.disconnect(); workletNode=null; }
  if (ws && ws.readyState === WebSocket.OPEN) {
    if (proxyPort) {
      ws.send(JSON.stringify({type:'commit'}));
    } else {
      ws.send(JSON.stringify({message_type:'input_audio_chunk',audio_base_64:'',commit:true,sample_rate:16000}));
    }
  }
  if (audioCtx) { audioCtx.close(); audioCtx=null; }
  if (stream)   { stream.getTracks().forEach(function(t){t.stop();}); stream=null; }

  if (lastPartial && !committed) {
    committed = true;
    sendToStreamlit(lastPartial);
    lbl.textContent = '✓ ' + shorten(lastPartial);
    lbl.className = 'done';
    btn.classList.add('done');
  } else if (!committed) {
    lbl.textContent = 'transcribing…';
    lbl.className = '';
  }
}

function cleanup() {
  listening = false;
  btn.classList.remove('listening');
  if (workletNode) { workletNode.port.onmessage=null; workletNode.disconnect(); workletNode=null; }
  if (audioCtx) { audioCtx.close(); audioCtx=null; }
  if (stream)   { stream.getTracks().forEach(function(t){t.stop();}); stream=null; }
  ws = null;
}

function shorten(t) { return t.length > 38 ? '…' + t.slice(-36) : t; }
</script></body></html>
